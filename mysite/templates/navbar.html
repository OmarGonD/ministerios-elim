{% load static %}
{% load wagtailcore_tags %}


<header>
    <!--MENU SUPERIOR-->
    <!-- Fixed navbar -->
    <nav class="navbar navbar-expand-md navbar-light fixed-top" id="top-navbar">
        <div class="container">

            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarCollapse"
                aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
                <!-- <span class="navbar-toggler-icon"><i class="fas fa-bars"></i></span> -->
                <span class="navbar-toggler-icon">   
                    <i class="fas fa-bars" style="color:#fff; font-size:28px;"></i>
                </span>
            </button>
            <div class="collapse navbar-collapse" id="navbarCollapse">
                <ul>
                    <li class="nav-link mt-2">
                        <a href="/">Inicio</a>
                    </li>

                    {% for item in navigation.menu_items.all %}
                    <li>
                        <a href="{{ item.link }}" class="nav-link mt-3" {% if item.open_in_new_tab %} target="_blank"
                            {% endif %}>{{ item.title }}</a>
                    </li>
                    {% endfor %}

                </ul>

            </div>
            <form class="form-inline ml-auto">
                {% if request.user.is_authenticated %}
                <span class="text-white">Hola, {{ request.user.username }}.</span>
                <a href="{% url 'logout' %}" class="btn btn-primary ml-2">Salir</a>
                {% else %}
                Hola,
                <a href="{% url 'login' %}" class="btn btn-outline-secondary">Ingresar</a>
                <a href="{% url 'registration' %}" class="btn btn-primary ml-2">Registro</a>
                {% endif %}
            </form>
        </div>
    </nav>
</header>
